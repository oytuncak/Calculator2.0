name: Deploy web to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow the workflow to publish to GitHub Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one concurrent Pages deployment; let the newest win.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # base-href must match the repo name so assets resolve under
      # https://<owner>.github.io/Calculator2.0/
      - name: Build web
        run: flutter build web --release --base-href "/Calculator2.0/"

      - uses: actions/configure-pages@v5
        with:
          # Enable Pages automatically (no need to set the source manually).
          enablement: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
