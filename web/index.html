<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Calculator 2.0 — a canvas calculator with live, linked results.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Calculator 2.0">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Calculator 2.0</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!-- Purge any service worker / caches left by older builds so a returning
       browser doesn't keep serving a stale app. The app itself ships with the
       service worker disabled (build uses --pwa-strategy=none). -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations()
        .then(function (rs) { rs.forEach(function (r) { r.unregister(); }); })
        .catch(function () {});
    }
    if (window.caches && caches.keys) {
      caches.keys()
        .then(function (ks) { ks.forEach(function (k) { caches.delete(k); }); })
        .catch(function () {});
    }
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
