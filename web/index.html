<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Calculator 2.0 — a canvas calculator with live, linked results.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Calculator 2.0">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Calculator 2.0</title>
  <link rel="manifest" href="manifest.json">

  <style>
    body { margin: 0; background: #f6f7fb; }
    #loading {
      position: fixed; inset: 0; display: flex; align-items: center;
      justify-content: center; flex-direction: column; gap: 14px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: #4f46e5;
    }
    #loading .spin {
      width: 32px; height: 32px; border: 3px solid #c7d2fe;
      border-top-color: #4f46e5; border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #boot-error { display: none; max-width: 80%; text-align: center; color: #b91c1c; }
  </style>
</head>
<body>
  <div id="loading">
    <div class="spin"></div>
    <div>Loading Calculator 2.0…</div>
    <div id="boot-error"></div>
  </div>

  <!-- Purge any service worker / caches left by older builds (which could
       otherwise keep serving a stale, blank app). -->
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations()
        .then(function (rs) { rs.forEach(function (r) { r.unregister(); }); })
        .catch(function () {});
    }
    if (window.caches && caches.keys) {
      caches.keys()
        .then(function (ks) { ks.forEach(function (k) { caches.delete(k); }); })
        .catch(function () {});
    }
  </script>

  <!-- Custom initialization: no service worker (avoids stale-cache blank
       screens across deploys), with a visible loader and error surface. -->
  {{flutter_js}}
  {{flutter_build_config}}
  <script>
    window.addEventListener('load', function () {
      _flutter.loader.load({
        onEntrypointLoaded: async function (engineInitializer) {
          try {
            const appRunner = await engineInitializer.initializeEngine();
            await appRunner.runApp();
            var l = document.getElementById('loading');
            if (l) l.remove();
          } catch (e) {
            showBootError(e);
          }
        }
        // No serviceWorkerSettings => the service worker is not registered.
      });
    });
    function showBootError(e) {
      var box = document.getElementById('boot-error');
      if (box) { box.style.display = 'block'; box.textContent = 'Failed to start: ' + e; }
    }
    window.addEventListener('error', function (ev) { showBootError(ev.message); });
  </script>
</body>
</html>
